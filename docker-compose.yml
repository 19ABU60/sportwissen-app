version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      no_cache: true
      args:
        - REACT_APP_BACKEND_URL=${DOMAIN_URL}
        - CACHE_BUST=${CACHE_BUST:-v2}
    container_name: sportwissen-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      no_cache: true
      args:
        - CACHE_BUST=${CACHE_BUST:-v2}
    container_name: sportwissen-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME:-sportwissen}
    volumes:
      - uploads-data:/app/uploads
    expose:
      - "8001"

volumes:
  uploads-data:
    driver: local
