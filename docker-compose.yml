version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${DOMAIN_URL}
    container_name: sportwissen-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - default
      - coolify

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sportwissen-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME:-sportwissen}
    volumes:
      - uploads-data:/app/uploads
    expose:
      - "8001"
    networks:
      - default

networks:
  default:
    driver: bridge
  coolify:
    external: true

volumes:
  uploads-data:
    driver: local
