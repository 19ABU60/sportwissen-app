version: '3.8'

services:
  # Frontend (React)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${DOMAIN_URL}
    container_name: sportwissen-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - sportwissen-network

  # Backend (FastAPI)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sportwissen-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME:-sportwissen}
    volumes:
      - uploads-data:/app/uploads
    expose:
      - "8001"
    networks:
      - sportwissen-network

networks:
  sportwissen-network:
    driver: bridge

volumes:
  uploads-data:
    driver: local
